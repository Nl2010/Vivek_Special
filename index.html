<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vivek</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    overflow:hidden;
}

/* Background Slider */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url("photo1.jpg") no-repeat center center/cover;
    animation: slide 10s infinite;
    z-index:-1;
    filter: brightness(60%);
}

@keyframes slide{
    0%{background:url("photo1.jpg") no-repeat center center/cover;}
    50%{background:url("photo2.jpg") no-repeat center center/cover;}
    100%{background:url("photo1.jpg") no-repeat center center/cover;}
}

.container{
    background: rgba(0,0,0,0.6);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(255,255,255,0.3);
    animation: fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

h1{
    font-size:28px;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.yes{
    background:#00ff88;
    color:black;
}

.no{
    background:#ff4d4d;
    color:white;
}

button:hover{
    transform:scale(1.1);
}

#result{
    margin-top:25px;
    font-size:32px;
    font-weight:bold;
    display:none;
    animation: glow 1s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #fff;}
    to{text-shadow:0 0 25px #00ffea;}
}

.shayari{
    margin-top:20px;
    font-size:18px;
    display:none;
    line-height:1.6;
}

</style>
</head>
<body>

<div class="container">
    <h1>TODAY YOUR BIRTHDAY?</h1>

    <button class="yes" onclick="showWish()">YES</button>
    <button class="no" onclick="alert('Phir bhi hum to wish karenge 😄')">NO</button>

    <div id="result">HAPPY BIRTHDAY HIMANSHU 🎉</div>

    <div class="shayari" id="shayari">
        Khushiyon ka ho tera har ek savera, <br>
        Muskurata rahe tera har andhera. <br>
        Dua hai rab se bas itni si mere bhai, <br>
        Har saal aaye tere liye khushiyon ka basera. ❤️
    </div>
</div>

<script>
function showWish(){
    document.getElementById("result").style.display="block";
    document.getElementById("shayari").style.display="block";
}
</script>

</body>
</html>
